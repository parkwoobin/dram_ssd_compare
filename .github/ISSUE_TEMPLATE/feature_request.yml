name: 기능 구현 요청
description: 새로운 기능 구현을 요청할 때 사용하세요
title: "[Feature] "
labels: ["gameplay"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 기능 설명
      description: 구현할 기능을 간략히 설명해주세요
    validations:
      required: true
  - type: textarea
    id: detail
    attributes:
      label: 상세 내용
      description: |
        기능의 동작 방식, 조작법, 관련 기획 등을 상세히 적어주세요.
        기획서 링크가 있다면 첨부해주세요.
    validations:
      required: true
  - type: textarea
    id: done_criteria
    attributes:
      label: 완료 기준
      description: 이 기능이 "완료"되려면 어떤 조건을 만족해야 하나요?
      placeholder: |
        - [ ] WASD 키로 캐릭터 이동 가능
        - [ ] Space 키로 점프 가능
        - [ ] 이동 애니메이션 적용
    validations:
      required: true
  # 우선순위는 라벨(`priority:high`/`priority:low`)로 관리합니다.
  # 템플릿 dropdown은 본문 텍스트로만 박혀서 필터·정렬에 쓸 수 없으므로 제거.
