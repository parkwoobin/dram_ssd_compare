<head>

<style>

  }.mark-root * { box-sizing:border-box; }.mark-root { background:var(--page); color:var(--text); font-family:var(--font); font-size:14px; overflow:hidden; display:flex; flex-direction:column; }.mark-root header { display:flex; flex-direction:column; gap:8px; padding:10px 18px; border-bottom:1px solid var(--border); background:var(--page); }.mark-root .hbar { display:flex; align-items:center; gap:12px; }.mark-root .hleft { display:flex; align-items:center; gap:10px; flex:1 1 auto; min-width:0; flex-wrap:wrap; }.mark-root .hicons { display:flex; align-items:center; gap:8px; flex:0 0 auto; }.mark-root .hbar2 { display:flex; align-items:center; gap:8px; }.mark-root .hbar2 #distBtn { margin-left:auto; }.mark-root .hbar2 .searchbox { flex:0 1 320px; min-width:0; }.mark-root .searchbox { position:relative; display:inline-flex; align-items:center; }.mark-root #search { width:100%; padding-right:26px; }.mark-root .searchclear { position:absolute; right:6px; top:50%; transform:translateY(-50%); border:0; background:transparent;

dth:230px; background:var(--panel);
              border:1px solid var(--border); border-radius:10px; box-shadow:0 10px 30px rgba(0,0,0,.45);
              padding:10px 12px; display:none; font-size:12px; color:var(--text); }.mark-root #distTune .dt-head { font-weight:800; margin-bottom:6px; display:flex; justify-content:space-between; }.mark-root #distTune .dt-row { display:flex; align-items:center; gap:8px; margin:6px 0; }.mark-root #distTune .dt-l { flex:0 0 86px; color:var(--text-dim); }.mark-root #distTune .dt-row input[type=range] { flex:1; min-width:0; accent-color:var(--accent); }.mark-root #distTune .dt-v { flex:0 0 40px; text-align:right; font-variant-numeric:tabular-nums; }.mark-root #distTune .dt-reset { cursor:pointer; color:var(--accent-2); font-weight:700; }.mark-root main { position:relative; flex:1 1 auto; min-height:0; overflow-x:hidden; overflow-y:auto; background:var(--page); }#scaleWrap { margin:4px auto; position:relative; }#stage { position:absolute; top:0; left:0; transform-origin:top left; will-change:transform; }#chart { width:100%; height:100%; }.mark-root #cmpBar { position:fixed; left:50%; bottom:18px; transform:translateX(-50%); display:none; align-items:center; gap:12px;
            background:var(--panel); border:1px solid var(--border); border-radius:12px; box-shadow:0 12px 36px rgba(0,0,0,.5);
            padding:10px 14px; z-index:60; }.mark-root #cmpBar.open { display:flex; }.mark-root #cmpBar .msg { color:var(--text); font-weight:700; font-size:13px; }.mark-root #backdrop { position:fixed; inset:0; background:transparent; display:none; z-index:40; }.mark-root #panel { position:fixed; top:58px; right:14px; width:380px; max-width:calc(100vw - 24px); max-height:calc(100vh - 72px); overflow:auto;
           background:var(--panel); border:1px solid var(--border); border-radius:12px; box-shadow:0 18px 50px rgba(0,0,0,.5), 0 0 0 1px var(--border);
           padding:16px; display:none; z-index:50; }.mark-root #panel.open, .mark-root #backdrop.open { display:block; }.mark-root .optrow { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin:11px 0; }.mark-root .optrow > .lbl { color:var(--text-dim); font-weight:700; min-width:48px; }.mark-root .ck { display:inline-flex; align-items:center; gap:6px; cursor:pointer; }.mark-root .ck input { accent-color:var(--accent); width:16px; height:16px; }.mark-root .swlbl { color:var(--text-dim); font-size:12px; font-weight:600; }.mark-root .swlbl.act { color:var(--accent-2); }.mark-root .sw { position:relative; width:46px; height:24px; display:inline-block; flex:0 0 auto; }.mark-root .sw input { opacity:0; width:0; height:0; }.mark-root .sw i { position:absolute; inset:0; background:var(--panel-2); border:1px solid var(--border); border-radius:999px; transition:.2s; }.mark-root .sw i:before { content:""; position:absolute; width:18px; height:18px; left:3px; top:2px; border-radius:50%; background:var(--text-dim); transition:.2s; }.mark-root .sw input:checked + i { background:var(--accent); border-color:var(--accent); }.mark-root .sw input:checked + i:before { left:25px; background:#fff; }.mark-root .pick { display:inline-flex; align-items:center; gap:5px; }.mark-root .pick .hex { width:80px; }.mark-root .series-filter { display:flex; gap:7px; flex-wrap:wrap; align-items:center; }.mark-root .chip { display:inline-flex; align-items:center; gap:6px; padding:4px 9px; border:1px solid var(--border); border-radius:999px; background:var(--panel-2); cursor:pointer; user-select:none; font-size:12px; }.mark-root .chip input { accent-color:var(--accent); }.mark-root .chip .dot { width:10px; height:10px; border-radius:50%; }.mark-root .count-badge { color:var(--text-dim); font-size:12px; }.mark-root .phead { font-weight:800; font-size:15px; margin:0 0 4px; }.mark-root hr.psep { border:none; border-top:1px solid var(--border); margin:12px 0; }
  @media (max-width:560px){.mark-root #panel { top:auto; bottom:0; right:0; left:0; width:100%; max-width:100%; border-radius:16px 16px 0 0; max-height:80vh; }.mark-root .sheet-handle { display:block; width:42px; height:4px; border-radius:2px; background:var(--border); margin:2px auto 12px; }.mark-root header { padding:8px 9px; }.mark-root .hbar, .mark-root .hbar2, .mark-root .hleft, .mark-root .hicons { gap:5px; }.mark-root h1 { font-size:12px; }.mark-root header select, .mark-root header input[type=text], .mark-root header button, .mark-root header .tab { height:30px; font-size:11px; }.mark-root .tab { padding:4px 7px; }.mark-root #distBtn, .mark-root #exportBtn { padding:5px 8px; }.mark-root select, .mark-root input[type=text] { padding:6px 7px; }.mark-root button.icon { width:30px; height:30px; }.mark-root #bench { max-width:92px; }

  /* === 임베드 오버라이드 === */
  .mark-root { height:82vh; min-height:500px; overflow:hidden; border-radius:8px; }
  .mark-root #panel { z-index: 9999 !important; }
  .mark-root #backdrop { z-index: 9998 !important; }
  .mark-root #stage { will-change: auto !important; }
  .mark-root #distTune { position:absolute; }
  /* 호스트 전역 header{align-items:center; justify-content:space-between; position:sticky} 누수 차단
     — 명시하지 않으면 임베드 헤더 2행이 좁게 가운데로 쏠린다 */
  .mark-root header { align-items:stretch !important; justify-content:flex-start !important; position:static !important; }
  /* 호스트 전역 .tabs{margin-bottom:20px} 누수 차단 — 데스크탑/노트북 탭이 벤치 select 보다 위로 떠
     (align-items:center 가 마진을 포함해 계산) 높이 정렬이 어긋난다 */
  .mark-root .tabs { margin:0 !important; }
  /* 검색창: 260608 방식 — 우측 고정폭(320px) 대신 둘째 줄의 남는 공간을 모두 채움 */
  .mark-root .hbar2 #distBtn { margin-left:0; }

  .mark-root #search { width:100%; }

<body>

<header>
  <div class="hbar">
    <div class="hleft">
      <h1>3DMark</h1>
      <select id="bench"></select>
      <div class="tabs">
        <div class="tab active" data-kind="desktop">데스크탑</div>
        <div class="tab" data-kind="laptop">노트북</div>
      </div>
    </div>
    <div class="hicons">
      <button class="icon" id="gearBtn" title="옵션">⚙</button>
    </div>
  </div>
  <div class="hbar2">
    <button id="distBtn" title="성능 분포(스팀 점유율)">성능분포</button>
    <div class="searchbox">
      <input type="text" id="search" placeholder="검색">
      <button id="searchClear" class="searchclear" title="지우기">✕</button>
    </div>
    <button class="primary" id="exportBtn">PNG 내보내기</button>
  </div>
</header>

<main><div id="scaleWrap"><div id="stage"><div id="chart"></div></div></div></main>

<div id="backdrop"></div>
<aside id="panel">
  <div class="sheet-handle"></div>
  <p class="phead">옵션</p>
  <div class="optrow">
    <span class="lbl">묶기</span>
    <label class="ck"><input type="checkbox" id="byGen" checked> 세대별</label>
    <label class="ck"><input type="checkbox" id="byVendor"> 제조사별</label>
  </div>
  <div class="optrow">
    <span class="lbl">세대</span>
    <span class="swlbl act" id="genRevL0">정순</span>
    <label class="sw"><input type="checkbox" id="genRev"><i></i></label>
    <span class="swlbl" id="genRevL1">역순</span>
  </div>
  <div class="optrow">
    <span class="lbl">점수</span>
    <span class="swlbl act" id="dirL0">낮은→높은</span>
    <label class="sw"><input type="checkbox" id="dir"><i></i></label>
    <span class="swlbl" id="dirL1">높은→낮은</span>
  </div>
  <div class="optrow">
    <span class="lbl">방향</span>
    <span class="swlbl act" id="orientL0">세로 막대</span>
    <label class="sw"><input type="checkbox" id="orient"><i></i></label>
    <span class="swlbl" id="orientL1">가로 막대</span>
  </div>
  <div class="optrow">
    <span class="lbl">비교</span>
    <span class="swlbl act" id="cmpL0">전체</span>
    <label class="sw"><input type="checkbox" id="compare"><i></i></label>
    <span class="swlbl" id="cmpL1">GPU 선택</span>
  </div>
  
  <hr class="psep">
  <div class="optrow">
    <span class="lbl">시리즈</span>
    <button id="selAll">전체</button><button id="selNone">해제</button>
    <span class="count-badge" id="shown"></span>
  </div>
  <div class="series-filter" id="seriesFilter"></div>
</aside>

<div id="cmpBar">
  <span class="msg" id="cmpMsg">비교할 GPU 막대를 클릭하세요</span>
  <button id="cmpCancel">취소</button>
  <button class="primary" id="cmpOk">확인</button>
</div>

function vendorOf(r) {
  const s = r.series;
  if (/^(GTX|RTX)/.test(s)) return "nvidia";
  if (/^RX|VEGA/.test(s)) return "amd";
  if (/Arc/.test(s)) return "intel";
  if (/Arc|Ultra/i.test(r.model)) return "intel";
  return "amd";
}
const colorOf = r => COL[vendorOf(r)];
function displayName(r) {
  const p = r.series.split(' ')[0], m = r.model;
  if (p === "Arc") return `Arc ${m}`;
  if (/^\d/.test(m) && ["RTX", "GTX", "RX"].includes(p)) return `${p} ${m}`;
  return m;
}

function fitTitle(name, avail) {
  const variants = [`${name} : Average Graphics Score`, `${name} : Avg Graphics Score`, `${name} : Graphics Score`, name];
  for (const v of variants) if (meas(v, 800, 23) <= avail) return v;
  return name;
}

function buildBenchSelect() {

function buildSeriesFilter() {
  const seen = [];
  for (const r of rows()) if (!seen.includes(r.series)) seen.push(r.series);
  activeSeries = new Set(seen);
  const box = document.getElementById('seriesFilter');

function filtered() {
  let out = rows().filter(r => activeSeries.has(r.series));
  if (compareSet) out = out.filter(r => compareSet.has(keyOf(r)));   // 확정된 비교 선택만
  return out;
}

function buildGroups() {
  const data = filtered();
  // 비교 그래프(확정): 세대/제조사 구분 없이 점수 낮은→높은만
  if (compareSet) return [{ label: "", rows: data.slice().sort((a, b) => a.score - b.score) }];
  let byGen, byVendor, dir, genRev;
  if (selecting) {                 // 선택창: 세대별 + 제조사별 + 점수 낮은→높은
    byGen = true; byVendor = true; dir = 1; genRev = false;
  } else {                         // 일반: 사용자 토글 그대로
    byGen = document.getElementById('byGen').checked;
    byVendor = document.getElementById('byVendor').checked;
    dir = document.getElementById('dir').checked ? -1 : 1;
    genRev = document.getElementById('genRev').checked;
  }
  const byScore = (a, b) => dir * (a.score - b.score);

  if (byGen) {
    const cmp = byVendor
      ? (a, b) => (VENDOR_ORDER.indexOf(vendorOf(a)) - VENDOR_ORDER.indexOf(vendorOf(b))) || byScore(a, b)
      : byScore;
    const groups = [];
    for (const [, sl] of CONFIG.groups[kind]) {
      const g = data.filter(r => sl.includes(r.series)).sort(cmp);
      if (!g.length) continue;
      const present = sl.filter(s => g.some(r => r.series === s));
      groups.push({ label: present.map(s => SERIES_DISP[s] || s).join(" & "), rows: g });
    }
    if (genRev) groups.reverse();
    return groups;
  }
  if (byVendor) {
    const groups = [];
    for (const v of VENDOR_ORDER) {
      const g = data.filter(r => vendorOf(r) === v).sort(byScore);
      if (g.length) groups.push({ label: VENDOR_LABEL[v], rows: g });
    }
    return groups;
  }
  return [{ label: "", rows: data.slice().sort(byScore) }];
}

function layout() {
  const groups = buildGroups();
  const items = [], bounds = [];
  items.push(null);
  let first = true;
  for (const g of groups) {
    if (!first) items.push(null);
    first = false;
    const start = items.length;
    g.rows.forEach(r => items.push(r));
    bounds.push({ label: g.label, start, end: items.length - 1 });
  }
  items.push(null);
  return { items, bounds };
}
function niceMax(v) { return Math.ceil((v * 1.15) / 1000) * 1000; }   // 최고점 +15%, 1000 단위
function niceInterval(maxv, target) {   // 눈금 간격: 대략 target 개가 되도록 1/2/2.5/5 단위로
  const rough = maxv / target;
  const pow = Math.pow(10, Math.floor(Math.log10(rough)));
  let best = pow;
  for (const c of [1, 2, 2.5, 5, 10]) { const v = c * pow; if (Math.abs(v - rough) < Math.abs(best - rough)) best = v; }
  return best;
}

/* ===== 성능 분포 히스토그램 (스팀 점유율 × 벤치 점수) ===== */
// 매칭용 공통 키: 제조사/패밀리·VRAM·메모리종류 제거, SUPER→S
function coreKey(s) {
  s = (s || "").toUpperCase();
  s = s.replace(/\b(NVIDIA|GEFORCE|AMD|RADEON|RTX|GTX|RX)\b/g, " ");
  s = s.replace(/\b(D4|D5|D6X|D6)\b/g, " ");
  s = s.replace(/\b\d+G(\/\d+G)*\b/g, " ");
  s = s.replace(/\bSUPER\b/g, "S");
  return s.replace(/\s+/g, " ").trim();
}
function distData() {
  const rows = (DATA.desktop && DATA.desktop[bench]) || [];
  const byCore = {};                          // coreKey → [score...] (VRAM 변종 평균용)
  for (const r of rows) {
    if (r.score == null) continue;
    const k = coreKey(r.model);
    (byCore[k] = byCore[k] || []).push(r.score);
  }
  const matched = [];
  for (const name in STEAM_SHARE) {
    const arr = byCore[coreKey(name)];        // 벤치에 없으면 제외
    if (!arr || !arr.length) continue;
    matched.push({ name, score: arr.reduce((a, b) => a + b, 0) / arr.length, share: STEAM_SHARE[name] });
  }
  const tot = matched.reduce((a, m) => a + m.share, 0) || 1;
  matched.forEach(m => m.pct = m.share / tot * 100);   // 겹치는 모델 합계를 100%로 재정규화
  return matched;
}
// 가우시안 커널 밀도(KDE)로 부드러운 분포 곡선. x 는 연속 점수축(세분화).
function distCurve(matched) {
  const maxS = Math.max(...matched.map(m => m.score));
  const win = niceInterval(maxS, DIST.bins) || 1000; // 기준 윈도(%) — 막대 스케일 유지용
  const h = win * DIST.smooth;                        // 대역폭(곡선 매끄러움)
  const norm = 1 / (h * Math.sqrt(2 * Math.PI));
  const xmax = Math.ceil(maxS / 2000) * 2000, grid = 200, step = xmax / grid;
  const pts = [];
  for (let i = 0; i <= grid; i++) {
    const x = i * step;
    let f = 0;
    for (const m of matched) { const z = (x - m.score) / h; f += m.pct * Math.exp(-0.5 * z * z); }
    pts.push([x, +(f * norm * win).toFixed(3)]);     // 밀도×윈도 = %/윈도 (기존과 유사 스케일)
  }
  return { pts, xmax, win };
}
function curveYAt(pts, x) {                  // 곡선 위 임의 점수의 y(선형 보간)
  if (x <= pts[0][0]) return pts[0][1];
  for (let i = 1; i < pts.length; i++) {
    if (pts[i][0] >= x) {
      const a = pts[i - 1], b = pts[i];
      return a[1] + (b[1] - a[1]) * (x - a[0]) / (b[0] - a[0] || 1);
    }
  }
  return pts[pts.length - 1][1];
}
// 봉우리 + 턱(서브클러스터) 검출: 표시 곡선보다 좁은 대역폭의 KDE 극대점을 찾는다.
function featureXs(matched, win, xmax) {
  const h2 = win * DIST.detectBw, norm = 1 / (h2 * Math.sqrt(2 * Math.PI));
  const grid = 500, step = xmax / grid, ys = [];
  for (let i = 0; i <= grid; i++) {
    const x = i * step; let f = 0;
    for (const m of matched) { const z = (x - m.score) / h2; f += m.share * Math.exp(-0.5 * z * z); }
    ys.push(f * norm);
  }
  const mY = Math.max(...ys), out = [], w = 4;
  for (let i = 1; i < grid; i++) {        // 양 끝까지 스캔(끝에 몰린 고급 카드 누락 방지)
    if (ys[i] < mY * DIST.thresh) continue;   // 고립된 고급 카드(낮은 봉우리)도 포함
    let top = ys[i] >= ys[i - 1] && ys[i] > ys[i + 1];
    for (let k = 1; k <= w && top; k++) {
      if (i - k >= 0 && ys[i] < ys[i - k]) top = false;
      if (i + k <= grid && ys[i] < ys[i + k]) top = false;
    }
    if (top) out.push(i * step);
  }
  return out;
}
function renderDist() {
  const P = pal();
  const accent = (getComputedStyle(document.querySelector('.mark-root') || document.body).getPropertyValue('--accent') || '#3b82f6').trim();
  const W = 1500, H = 850;
  curW = W; curH = H;
  stage.style.width = W + "px"; stage.style.height = H + "px";
  chart.resize();
  const title = [{ text: benchTitle() + " : Performance distribution", left: "center", top: 16,
                   textStyle: { color: P.title, fontSize: 23, fontWeight: 800 } }];
  const matched = distData();
  if (!matched.length) {
    chart.setOption({ backgroundColor: COL.bg, textStyle: { fontFamily: FONT }, title,
      xAxis: { show: false }, yAxis: { show: false }, series: [], graphic: [] }, true);
    fit(); return;
  }
  const c = distCurve(matched);
  // 봉우리(곡선 극대점)마다 그 구간에서 점유율 가장 높은 GPU 1개를 대표로 표시
  const peaks = [];
  {
    const cands = [], seen = new Set();
    for (const X of featureXs(matched, c.win, c.xmax)) {
      const near = matched.filter(m => Math.abs(m.score - X) <= X * DIST.peakWin);
      if (!near.length) continue;
      // 점유율 최고를 기본으로, 점유율이 비슷하면 봉우리에 더 가까운 카드 선택
      const maxShare = Math.max(...near.map(m => m.share));
      const tied = near.filter(m => m.share >= maxShare * DIST.shareTol);
      const rep = tied.reduce((a, m) => Math.abs(m.score - X) < Math.abs(a.score - X) ? m : a);
      if (!seen.has(rep.name)) { seen.add(rep.name); cands.push(rep); }
    }
    cands.sort((a, b) => a.score - b.score);
    const minGap = c.xmax * DIST.minGap;           // 라벨 과밀 방지(가까우면 점유율 높은 쪽만)
    for (const r of cands) {
      const prev = peaks[peaks.length - 1];
      if (prev && r.score - prev.score < minGap) {
        if (r.share > prev.share) peaks[peaks.length - 1] = { name: r.name, score: r.score, share: r.share, coord: [r.score, curveYAt(c.pts, r.score)] };
        continue;
      }
      peaks.push({ name: r.name, score: r.score, share: r.share, coord: [r.score, curveYAt(c.pts, r.score)] });
    }
  }
  chart.setOption({
    animation: false, backgroundColor: COL.bg, textStyle: { fontFamily: FONT }, title,
    grid: { left: 66, right: 36, top: 70, bottom: 56 },
    tooltip: { trigger: "axis", formatter: ps => {
      const x = ps[0].value[0], pct = (+ps[0].value[1]).toFixed(2);
      let s = `${Math.round(x).toLocaleString()} 점 · <b>${pct}%</b>`;
      const near = ((DATA.desktop && DATA.desktop[bench]) || [])      // 비슷한 성능대(±4%)
        .filter(r => r.score != null && Math.abs(r.score - x) <= x * DIST.tipPct)
        .sort((a, b) => b.score - a.score);
      if (near.length) {
        const list = near.slice(0, 12).map(r =>
          `<div style="display:flex;justify-content:space-between;gap:18px"><span>${displayName(r)}</span><b>${r.score.toLocaleString()}</b></div>`).join("")
           + (near.length > 12 ? `<div>… 외 ${near.length - 12}개</div>` : "");
        s += '<hr style="margin:5px 0;border:0;border-top:1px solid rgba(128,128,128,.35)">'
           + `<div style="font-size:11px;min-width:160px">${list}</div>`;
      }
      return s; } },
    xAxis: { type: "value", min: 0, max: c.xmax, interval: 2000,
      axisTick: { show: false }, axisLine: { lineStyle: { color: P.axis } },
      axisLabel: { color: P.sub, fontSize: 12, formatter: v => v >= 1000 ? (v / 1000) + "k" : "" + v },
      splitLine: { lineStyle: { color: P.grid } } },
    yAxis: { type: "value", min: 0,
      axisLabel: { color: P.sub, fontSize: 12, formatter: "{value}%" },
      splitLine: { lineStyle: { color: P.grid } }, axisLine: { show: true, lineStyle: { color: P.axis } } },
    series: [{ type: "line", smooth: true, symbol: "none", data: c.pts,
      lineStyle: { color: accent, width: 2 }, itemStyle: { color: accent },
      areaStyle: { color: accent, opacity: 0.22 },
      markPoint: { symbol: "circle", symbolSize: 6, itemStyle: { color: accent }, silent: true,
        label: { show: true, position: "top", distance: 7, color: P.title, fontSize: 11, fontWeight: 600,
                 formatter: p => p.name }, data: peaks } }],
  }, true);
  fit();
}

/* 분포 변수 조절 임시 팝업 */
const DT_CTRLS = [
  ["smooth", "스무딩", 0.2, 1.5, 0.05], ["detectBw", "라벨대역폭", 0.2, 1.0, 0.05],
  ["peakWin", "봉우리거리", 0.02, 0.2, 0.005], ["shareTol", "점유율비슷", 0.5, 1.0, 0.05],
  ["minGap", "라벨간격", 0.01, 0.15, 0.005], ["thresh", "봉우리임계", 0.002, 0.05, 0.002],
  ["bins", "눈금수", 8, 30, 1], ["tipPct", "툴팁±%", 0.01, 0.1, 0.005],
];
const DIST_DEF = { ...DIST };
function buildDistTune() {
  const box = document.createElement("div"); box.id = "distTune";
  const head = document.createElement("div"); head.className = "dt-head";
  head.innerHTML = '<span>분포 변수 (임시)</span><span class="dt-reset" id="dtReset">기본값</span>';
  box.appendChild(head);
  const vsp = {};
  for (const [key, label, min, max, step] of DT_CTRLS) {
    const row = document.createElement("label"); row.className = "dt-row";
    const l = document.createElement("span"); l.className = "dt-l"; l.textContent = label;
    const r = document.createElement("input"); r.type = "range"; r.min = min; r.max = max; r.step = step;
    r.value = DIST[key]; r.dataset.k = key;
    const v = document.createElement("span"); v.className = "dt-v"; v.textContent = DIST[key]; vsp[key] = v;
    r.addEventListener("input", () => { DIST[key] = parseFloat(r.value); v.textContent = r.value; if (distMode) render(); });
    row.append(l, r, v); box.appendChild(row);
  }
  (document.querySelector('.mark-root') || document.body).appendChild(box);
  box.querySelector("#dtReset").addEventListener("click", () => {
    Object.assign(DIST, DIST_DEF);
    box.querySelectorAll("input[type=range]").forEach(r => { r.value = DIST[r.dataset.k]; vsp[r.dataset.k].textContent = DIST[r.dataset.k]; });
    if (distMode) render();
  });
  return box;
}

/* ---------- 렌더 (고정 크기로 그리고, 보이기는 창에 맞춰 스케일) ---------- */
let LAST = null, curW = 0, curH = 0;
function render() {
  if (distMode) { renderDist(); return; }   // 성능 분포 모드
  const { items, bounds } = layout();
  const real = items.filter(Boolean);
  document.getElementById('shown').textContent = real.length + "개";
  if (!real.length) { chart.clear(); return; }

  const horiz = orientation === "horizontal";
  const cmp = selecting || !!compareSet;   // 비교 모드: 그룹명/워터마크 숨김
  const P = pal();
  const yMax = niceMax(Math.max(...real.map(r => r.score)));
  let modelMax = 0;
  for (const r of real) modelMax = Math.max(modelMax, meas(r.model, 700, CONFIG.modelLabelFont));

  // 내부 렌더 크기는 고정(막대 크기 일정) → 막대 개수에 따라 캔버스 크기만 결정
  let gridLeft, gridRight, gridTop, gridBottom, W, H;
  if (!horiz) {
    gridLeft = CONFIG.gridLeftV; gridRight = CONFIG.gridRightV; gridTop = CONFIG.gridTopV;
    gridBottom = 14 + modelMax + 16 + (cmp ? 8 : CONFIG.groupLabelFont + 14);   // 비교 모드: 그룹명 공간 제거
    W = gridLeft + items.length * CONFIG.barSpacing + gridRight;
    H = gridTop + CONFIG.plotHV + gridBottom;
  } else {
    gridTop = CONFIG.gridTopV + 26; gridBottom = 50;
    gridLeft = modelMax + (cmp ? 14 : CONFIG.groupLabelFont + 46); gridRight = 70;   // 비교 모드: 그룹명 공간 제거
    H = gridTop + items.length * CONFIG.barSpacing + gridBottom;
    W = gridLeft + CONFIG.plotWH + gridRight;
  }
  const barWidth = CONFIG.barW;
  curW = W; curH = H;
  stage.style.width = W + "px"; stage.style.height = H + "px";
  chart.resize();

  const q = (document.getElementById('search').value || "").trim().toLowerCase();   // 검색: 형태 유지, 비매칭 흐리게
  const cats = items.map(r => r ? r.model : "");
  const vals = items.map(r => {
    if (!r) return { value: null };
    const st = { color: colorOf(r) };
    if (selecting) st.opacity = pendingSel.has(keyOf(r)) ? 1 : 0.15;            // 선택 중: 고른 막대만 밝게
    else if (q && !(r.model + " " + r.series).toLowerCase().includes(q)) st.opacity = 0.15;  // 검색 비매칭 흐리게
    return { value: r.score, itemStyle: st, _r: r };
  });

  // 적응형 제목/워터마크 (좁을 때)
  const sideW = Math.max(meas(dateStr(), 700, 15), meas(CONFIG.maker, 700, 15));
  const titleText = fitTitle(benchTitle(), W - 2 * (sideW + 26));
  let wmFont = CONFIG.watermarkFont;
  const wmMax = W * 0.42;
  let wmW = meas(CONFIG.watermark, 900, wmFont);
  if (wmW > wmMax) { wmFont = Math.max(60, wmFont * wmMax / wmW); wmW = meas(CONFIG.watermark, 900, wmFont); }

  const catAxis = {
    type: "category", data: cats, boundaryGap: false,
    axisLabel: { interval: 0, color: P.score, fontSize: CONFIG.modelLabelFont, fontWeight: "bold", rotate: horiz ? 0 : 90, margin: 10 },
    axisTick: { show: false }, axisLine: { lineStyle: { color: P.axis } },
  };
  if (horiz) catAxis.inverse = true;
  const interval = cmp ? niceInterval(yMax, 10) : 5000;   // 비교 모드: 점수 범위에 맞춰 눈금 촘촘하게
  const valAxis = {
    type: "value", max: yMax, interval: interval,
    axisLabel: { color: P.sub, fontSize: 12, formatter: v => (v === yMax && yMax % interval !== 0) ? "" : String(v) },
    splitLine: { lineStyle: { color: P.grid } },
    minorTick: { show: true, splitNumber: 5 },
    minorSplitLine: { show: true, lineStyle: { color: P.minor } },
    axisLine: { show: true, lineStyle: { color: P.axis } },
  };

  chart.setOption({
    animation: false, backgroundColor: COL.bg, textStyle: { fontFamily: FONT },
    title: [
      { text: titleText, left: "center", top: 16, textStyle: { color: P.title, fontSize: 23, fontWeight: 800 } },
      { text: dateStr(), left: 22, top: 20, textStyle: { color: P.sub, fontSize: 15, fontWeight: 700 } },
      { text: CONFIG.maker, right: 22, top: 20, textStyle: { color: P.sub, fontSize: 15, fontWeight: 700 } },
    ],
    grid: { left: gridLeft, right: gridRight, top: gridTop, bottom: gridBottom },
    tooltip: { show: !selecting, trigger: "item", formatter: p => p.data._r
      ? `<b>${displayName(p.data._r)}</b><br>${benchTitle()} Graphics: <b>${markFmt(p.value)}</b><br>결과수: ${markFmt(p.data._r.count)}` : "" },
    xAxis: horiz ? valAxis : catAxis,
    yAxis: horiz ? catAxis : valAxis,
    series: [{
      type: "bar", data: vals, barWidth,
      label: { show: true, position: horiz ? "right" : "top", color: P.score, fontSize: CONFIG.scoreLabelFont,
        distance: 4, rotate: horiz ? 0 : 90, align: "left", verticalAlign: "middle",
        formatter: p => p.data._r ? markFmt(p.value) : "" },
    }],
  }, true);

  LAST = { items, bounds, horiz, gridLeft, gridRight, gridTop, gridBottom, W, H, modelMax, yMax, interval, wmFont, wmW, P };
  requestAnimationFrame(drawOverlay);
  fit();
}

/* 좌우 폭에만 맞춰 스케일, 높이는 넘치면 세로 스크롤 — transform만 바꾸므로 실시간 */
function fit() {
  if (!curW || !curH) return;
  const availW = mainEl.clientWidth - 2 * CONFIG.fitPad;
  if (availW <= 0) return;
  let s = availW / curW;
  if (s > CONFIG.maxScale) s = CONFIG.maxScale;
  if (s <= 0) s = 0.01;
  stage.style.transform = `scale(${s})`;
  scaleWrap.style.width = (curW * s) + "px";     // 스케일된 크기를 레이아웃 박스로 → 세로 스크롤 동작
  scaleWrap.style.height = (curH * s) + "px";
}

function drawOverlay() {
  if (distMode || !LAST) return;
  const { items, bounds, horiz, gridLeft, gridRight, gridTop, gridBottom, W, H, modelMax, yMax, interval, wmFont, wmW, P } = LAST;
  const catPix = i => chart.convertToPixel({ [horiz ? "yAxisIndex" : "xAxisIndex"]: 0 }, i);

  const cmp = selecting || !!compareSet;   // 비교 모드: 워터마크/그룹명 숨김
  const gfx = [];
  if (!cmp) {   // 워터마크: 세로 → 좌상단, 가로 → 우상단(조금 안쪽). 비교 모드에선 숨김
    const wmLeft = horiz ? Math.max(W - wmW - 180, gridLeft + 20) : 150;
    const wmTop = horiz ? 200 : 130;
    gfx.push({ type: "text", left: wmLeft, top: wmTop, z: 0, silent: true,
      style: { text: CONFIG.watermark, fontSize: wmFont, fontWeight: 900, fill: P.wm, fontFamily: FONT } });
  }

  if (!horiz) {
    const yT = gridTop, yB = H - gridBottom, groupY = yB + 14 + modelMax + 16;
    // 맨 오른쪽 세로 경계선(왼쪽 축선과 대칭으로 박스 닫기)
    gfx.push({ type: "line", z: 1, silent: true, shape: { x1: W - gridRight, y1: yT, x2: W - gridRight, y2: yB }, style: { stroke: P.axis, lineWidth: 1 } });
    for (let i = 0; i < bounds.length - 1; i++) {
      const xm = (catPix(bounds[i].end) + catPix(bounds[i + 1].start)) / 2;
      gfx.push({ type: "line", z: 1, silent: true, shape: { x1: xm, y1: yT, x2: xm, y2: yB }, style: { stroke: P.div, lineWidth: 1 } });
    }
    if (!cmp) for (const b of bounds) {
      if (!b.label) continue;
      const cx = (catPix(b.start) + catPix(b.end)) / 2;
      const tw = meas(b.label, 700, CONFIG.groupLabelFont);   // 글자폭만큼 좌측 이동 → 그룹 중앙 정렬
      gfx.push({ type: "text", left: cx - tw / 2, top: groupY, z: 5, silent: true,
        style: { text: b.label, fill: P.group, fontSize: CONFIG.groupLabelFont, fontWeight: 700, fontFamily: FONT } });
    }
  } else {
    const xL = gridLeft, xR = W - gridRight;
    // 맨 위 가로 경계선(아래 축선과 대칭으로 박스 닫기)
    gfx.push({ type: "line", z: 1, silent: true, shape: { x1: xL, y1: gridTop, x2: xR, y2: gridTop }, style: { stroke: P.axis, lineWidth: 1 } });
    for (let v = 0; v <= yMax; v += interval) {
      const x = chart.convertToPixel({ xAxisIndex: 0 }, v);
      if (x == null) continue;
      gfx.push({ type: "text", left: x, top: gridTop - 24, z: 5, silent: true,
        style: { text: String(v), textAlign: "center", fill: P.sub, fontSize: 12, fontFamily: FONT } });
    }
    for (let i = 0; i < bounds.length - 1; i++) {
      const ym = (catPix(bounds[i].end) + catPix(bounds[i + 1].start)) / 2;
      gfx.push({ type: "line", z: 1, silent: true, shape: { x1: xL, y1: ym, x2: xR, y2: ym }, style: { stroke: P.div, lineWidth: 1 } });
    }
    if (!cmp) for (const b of bounds) {
      if (!b.label) continue;
      const cy = (catPix(b.start) + catPix(b.end)) / 2;
      const tw = meas(b.label, 700, CONFIG.groupLabelFont);   // 세로와 동일하게 -tw/2 로 그룹 중앙 정렬
      gfx.push({ type: "text", left: 16, top: cy - tw / 2, z: 5, silent: true,
        rotation: -Math.PI / 2, originX: 0, originY: 0,
        style: { text: b.label, fill: P.group, fontSize: CONFIG.groupLabelFont, fontWeight: 700, fontFamily: FONT } });
    }
  }
  chart.setOption({ graphic: gfx });
}

const cmpBar = document.getElementById('cmpBar');
function updateCmpMsg() { document.getElementById('cmpMsg').textContent = `비교할 GPU 막대 클릭 · ${pendingSel.size}개 선택`; }
function startCompare() {            // 토글 ON: 팝업 닫고 선택 모드(그래프 어둡게) + 가로 막대 자동 전환

  selecting = false; compareSet = null; pendingSel.clear();

// 옵션 팝업
function openPanel(o) {
  const panel = document.getElementById('panel');
  if (o) {
    if (window.matchMedia('(max-width:560px)').matches) {
      // 모바일: 바텀시트 — 인라인 위치값 제거하고 CSS media query(#panel bottom:0…) 에 맡긴다
      ['top', 'right', 'left', 'bottom', 'width', 'maxHeight', 'transform'].forEach(k => panel.style[k] = '');
    } else {
      // 데스크탑: 기어 버튼 기준 드롭다운
      const gear = document.getElementById('gearBtn');
      const r = gear.getBoundingClientRect();
      const gap = 6, margin = 12;
      const panelWidth = Math.min(window.innerWidth - margin * 2, 380);
      const right = Math.max(margin, Math.min(window.innerWidth - r.right, window.innerWidth - panelWidth - margin));
      panel.style.top = (r.bottom + 4) + 'px';
      panel.style.right = right + 'px';
      panel.style.left = 'auto';
      panel.style.bottom = 'auto';
      panel.style.width = '';
      panel.style.maxHeight = `calc(100vh - ${r.bottom + gap + margin}px)`;
    }
  }
  panel.classList.toggle('open', o);
  document.getElementById('backdrop').classList.toggle('open', o);
}
document.getElementById('gearBtn').addEventListener('click', () => openPanel(!document.getElementById('panel').classList.contains('open')));
document.getElementById('backdrop').addEventListener('click', () => openPanel(false));

// 모바일: 팝업(바텀시트)을 아래로 슬라이드해서 닫기
(function () {
  const panel = document.getElementById('panel');
  let y0 = null, dy = 0;
  const isSheet = () => window.matchMedia('(max-width:560px)').matches;
  panel.addEventListener('touchstart', e => {
    if (!isSheet() || panel.scrollTop > 0) { y0 = null; return; }   // 내용 스크롤 중이면 무시
    y0 = e.touches[0].clientY; dy = 0; panel.style.transition = 'none';
  }, { passive: true });
  panel.addEventListener('touchmove', e => {
    if (y0 === null) return;
    dy = e.touches[0].clientY - y0;
    if (dy > 0) { panel.style.transform = `translateY(${dy}px)`; e.preventDefault(); }   // 페이지 스크롤/새로고침 방지
  }, { passive: false });
  panel.addEventListener('touchend', () => {
    if (y0 === null) return;
    panel.style.transition = 'transform .2s';
    if (dy > 90) openPanel(false);                                  // 충분히 내리면 닫기
    panel.style.transform = '';                                     // 아니면 제자리로
    y0 = null; dy = 0;
  });
})();


// 색상 피커 + 기본 버튼
function bindColor(key, cId, hId) {

}

});

// 창 크기 변경: 다시 그리지 않고 스케일(transform)만 갱신 → 실시간으로 따라 움직임
let _raf; window.addEventListener('resize', () => { if (_raf) cancelAnimationFrame(_raf); _raf = requestAnimationFrame(fit); });

/* Pretendard 웹폰트가 캔버스 렌더보다 늦게 준비되면(특히 새로고침 시 캐시된 JS가 즉시 렌더)
   기본 폰트로 그려진다. 폰트 로드가 끝나면 한 번 더 그린다. */
function ensureFont() {
  if (!document.fonts || !document.fonts.load) return;
  Promise.all(["400", "500", "700", "800", "900"].map(w => document.fonts.load(w + " 16px Pretendard")))
    .then(() => document.fonts.ready)
    .then(() => render())
    .catch(() => {});
}

/* 초기화 */
applyTheme();
distBtn.style.display = (kind === 'desktop') ? '' : 'none';
document.querySelector('.hbar2 .searchbox').style.marginLeft = (kind === 'desktop') ? '' : 'auto';
syncPickers(); buildBenchSelect(); buildSeriesFilter(); refreshSwitches();
render();

/* 앱 테마 변경 감지 — 메인 앱이 .mark-root 의 class(light)를 바꾸면 차트도 재렌더 */
(function() {
  const root = document.querySelector('.mark-root');
  if (!root) return;
  let _pendingRender = false;
  new MutationObserver(() => {
    const next = root.classList.contains('light') ? 'light' : 'dark';
    if (next === theme) return;
    theme = next;
    COL = { ...THEME_COLORS[theme] };
    syncPickers(); refreshChips();
    if (root.offsetParent === null) { _pendingRender = true; return; }
    render();
  }).observe(root, { attributes: true, attributeFilter: ['class'] });
  new MutationObserver(() => {
    if (_pendingRender && root.offsetParent !== null) {
      _pendingRender = false;
      requestAnimationFrame(() => { render(); fit(); });
    }
  }).observe(root.closest('[style]') || root.parentElement, { attributes: true, attributeFilter: ['style'] });
})();
requestAnimationFrame(fit);
ensureFont();
})();   // 폰트 준비되면 재렌더(설치 안 된 PC에서 새로고침 시 fallback 방지)
</script>
</body>
</html>
