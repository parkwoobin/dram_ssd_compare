services:
  app:
    build: .
    container_name: dram-ssd-compare
    ports:
      - "80:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./data/prices.db
      ENABLE_SCHEDULER: "true"
      ENABLE_INITIAL_CRAWL: "true"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
