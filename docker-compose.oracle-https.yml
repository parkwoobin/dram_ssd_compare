services:
  app:
    build: .
    container_name: dram-ssd-compare
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./data/prices.db
      ENABLE_SCHEDULER: "true"
      ENABLE_INITIAL_CRAWL: "true"
    volumes:
      - ./data:/app/data
      - ./HTML:/app/HTML
      - ./frontend:/app/frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    container_name: dram-ssd-caddy
    depends_on:
      - app
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  caddy_data:
  caddy_config:
