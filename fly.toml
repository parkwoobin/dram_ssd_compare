app = "dram-ssd-compare"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  DATABASE_URL = "sqlite+aiosqlite:///./data/prices.db"
  ENABLE_SCHEDULER = "true"
  ENABLE_INITIAL_CRAWL = "true"

[[services]]
  protocol = "tcp"
  internal_port = 8000

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "30s"

[[mounts]]
  source = "dram_data"
  destination = "/app/data"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
